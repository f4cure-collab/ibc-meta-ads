<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:#0f0f23;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .card{background:#1a1a3e;border:1px solid #2a2a4a;border-radius:12px;padding:40px;width:400px}
        h2{color:#4f8cff;margin-bottom:8px}
        p{color:#888;font-size:13px;margin-bottom:20px}
        label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;margin-top:12px}
        input{width:100%;padding:10px 14px;background:#0f0f23;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;font-size:14px}
        input:focus{border-color:#4f8cff;outline:none}
        .btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;background:#4f8cff;color:#fff}
        .btn:hover{background:#3a7aef}
        .alert{padding:10px;border-radius:8px;margin-top:12px;font-size:13px;display:none}
        .alert-err{background:#3a1a1a;color:#ff8a8a}
    </style>
</head>
<body>
<div class="card">
    <h2>Redefinir Senha</h2>
    <p>Esta e a sua primeira vez acessando. Por favor, crie uma nova senha.</p>
    <label>Nova Senha</label>
    <input type="password" id="p1" placeholder="Minimo 6 caracteres">
    <label>Confirmar Senha</label>
    <input type="password" id="p2" placeholder="Repita a senha">
    <button class="btn" onclick="doReset()">Salvar Nova Senha</button>
    <div class="alert alert-err" id="err"></div>
</div>
<script>
async function doReset(){
    var p1=document.getElementById('p1').value;
    var p2=document.getElementById('p2').value;
    var err=document.getElementById('err');
    err.style.display='none';
    if(p1!==p2){err.textContent='Senhas nao conferem';err.style.display='block';return;}
    if(p1.length<6){err.textContent='Minimo 6 caracteres';err.style.display='block';return;}
    var r=await fetch('/api/admin/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({new_password:p1})});
    var d=await r.json();
    if(d.ok){window.location='/dashboard';}
    else{err.textContent=d.error;err.style.display='block';}
}
</script>
</body>
</html>
